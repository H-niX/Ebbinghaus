<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简单测试</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2>简单表单测试</h2>
        
        <form id="testForm">
            <div class="mb-3">
                <label class="form-label">学习日期</label>
                <input type="date" class="form-control" id="learnDate" required>
            </div>
            <div class="mb-3">
                <label class="form-label">学习类型</label>
                <select class="form-control" id="wordType">
                    <option value="word">单词学习</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary" id="submitBtn">记录学习</button>
        </form>
        
        <div id="result" class="mt-3"></div>
        <div id="debug" class="mt-3"></div>
    </div>

    <script>
        console.log('脚本开始执行');
        
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM加载完成');
            
            // 设置今天日期
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('learnDate').value = today;
            console.log('设置日期为:', today);
            
            // 表单提交事件
            const form = document.getElementById('testForm');
            console.log('表单元素:', form);
            
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                console.log('表单提交事件触发!');
                
                const learnDate = document.getElementById('learnDate').value;
                const wordType = document.getElementById('wordType').value;
                
                console.log('表单数据:', { learnDate, wordType });
                
                document.getElementById('debug').innerHTML = `
                    <div class="alert alert-info">
                        <strong>调试信息:</strong><br>
                        日期: ${learnDate}<br>
                        类型: ${wordType}<br>
                        时间: ${new Date().toLocaleString()}
                    </div>
                `;
                
                // 发送请求
                try {
                    console.log('开始发送请求...');
                    
                    const response = await fetch('/api/add_learning', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            date: learnDate,
                            type: wordType
                        })
                    });
                    
                    console.log('响应状态:', response.status);
                    const data = await response.json();
                    console.log('响应数据:', data);
                    
                    // 显示结果
                    document.getElementById('result').innerHTML = `
                        <div class="alert ${data.success ? 'alert-success' : 'alert-danger'}">
                            <strong>API响应:</strong><br>
                            状态码: ${response.status}<br>
                            成功: ${data.success}<br>
                            消息: ${data.message || data.error}
                        </div>
                    `;
                    
                } catch (error) {
                    console.error('请求失败:', error);
                    document.getElementById('result').innerHTML = `
                        <div class="alert alert-danger">
                            <strong>请求失败:</strong> ${error.message}
                        </div>
                    `;
                }
            });
            
            console.log('事件监听器已设置');
        });
    </script>
</body>
</html>
